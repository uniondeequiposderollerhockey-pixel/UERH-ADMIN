<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UERH Admin - Panel Oficial</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

    <style>
        :root {
            --bg-dark: #0a0e17; --bg-card: #111622; --text-main: #ffffff;
            --text-muted: #8b9bb4; --success: #27ae60; --danger: #ea4335;
            --color-blue: #4285f4; --color-red: #ea4335;
        }

        body {
            font-family: 'Segoe UI', Roboto, sans-serif; margin: 0; 
            background-color: var(--bg-dark); color: var(--text-main);
            min-height: 100vh;
            background-image: radial-gradient(circle at 50% -20%, rgba(66,133,244,0.15) 0%, rgba(10,14,23,0) 50%);
        }

        #login-screen {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100vh; text-align: center; padding: 20px;
        }
        .logo-main { 
            font-size: 4rem; font-weight: 800; letter-spacing: 0.2em; margin: 0; 
            background: linear-gradient(90deg, #fff, #aaa); -webkit-background-clip: text; -webkit-text-fill-color: transparent; 
        }
        .logo-subtext { font-size: 0.75rem; color: var(--text-muted); text-transform: uppercase; margin-bottom: 30px; letter-spacing: 2px; }

        .btn-google {
            background: transparent; color: white; border: none; display: flex;
            align-items: center; justify-content: center; gap: 12px; width: 280px;
            padding: 14px; border-radius: 8px; font-weight: 600; cursor: pointer;
            position: relative; z-index: 1; transition: transform 0.2s;
        }
        .btn-google::before {
            content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            border-radius: 8px; padding: 2px;
            background: linear-gradient(90deg, var(--color-blue), var(--color-red), var(--color-blue), var(--color-red));
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: destination-out; mask-composite: exclude;
        }

        .container { max-width: 1100px; margin: auto; padding: 20px; display: none; }
        .user-bar { background: var(--bg-card); padding: 12px 20px; border-radius: 10px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; border: 1px solid rgba(255,255,255,0.05); font-size: 0.85rem; }
        
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .stats { display: flex; gap: 12px; }
        .stat-box { background: var(--bg-card); padding: 10px 18px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.05); text-align: center; min-width: 110px; }
        .stat-box small { display: block; font-size: 0.65rem; color: var(--color-blue); text-transform: uppercase; }
        .stat-box span { font-size: 1.2rem; font-weight: bold; }

        .controls-row { display: flex; gap: 10px; margin-bottom: 15px; flex-wrap: wrap; align-items: center; }
        .search-input, .select-input { 
            background: #1c2333; border: 1px solid #333; color: white; 
            padding: 10px; border-radius: 6px; font-size: 0.85rem; outline: none;
        }
        .btn-export { 
            background: #27ae60; color: white; border: none; padding: 10px 15px; 
            border-radius: 6px; cursor: pointer; font-weight: bold; margin-left: auto;
        }

        .table-wrapper { background: var(--bg-card); border-radius: 12px; overflow: hidden; border: 1px solid rgba(255,255,255,0.05); }
        table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
        th { background: #161b28; color: var(--color-blue); text-align: left; padding: 15px; text-transform: uppercase; font-size: 0.7rem; }
        td { padding: 12px 15px; border-bottom: 1px solid rgba(255,255,255,0.03); }

        .foto-mini { width: 45px; height: 45px; object-fit: cover; border-radius: 6px; cursor: pointer; border: 1px solid #333; margin-right: 5px; }
        
        .badge { padding: 4px 8px; border-radius: 5px; font-size: 0.7rem; font-weight: bold; }
        .badge-approved { background: rgba(39, 174, 96, 0.1); color: #27ae60; }
        .badge-pending { background: rgba(241, 196, 15, 0.1); color: #f1c40f; }

        .btn-action { border: none; padding: 6px 10px; border-radius: 4px; cursor: pointer; font-size: 0.75rem; color: white; margin-right: 3px; }
        .btn-ok { background: var(--success); }
        .btn-no { background: var(--danger); }
        .btn-edit { background: #555; }

        /* Modales */
        .modal-overlay { display: none; position: fixed; z-index: 1000; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); backdrop-filter: blur(8px); justify-content: center; align-items: center; }
        #modal-img { max-width: 90%; max-height: 80vh; border-radius: 10px; }

        .modal-content { 
            background: var(--bg-card); padding: 30px; border-radius: 15px; 
            width: 400px; border: 1px solid #333; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            max-height: 90vh; overflow-y: auto;
        }
        .modal-content h3 { margin-top: 0; color: var(--color-blue); }
        .modal-content label { display: block; margin: 15px 0 5px; font-size: 0.8rem; color: var(--text-muted); }
        .modal-content input, .modal-content select { width: 100%; background: #0a0e17; border: 1px solid #333; color: white; padding: 10px; border-radius: 6px; box-sizing: border-box; }
        .modal-actions { display: flex; justify-content: flex-end; gap: 10px; margin-top: 25px; }
        .btn-save { background: var(--color-blue); color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; }
        .btn-cancel { background: transparent; color: #888; border: 1px solid #333; padding: 10px 20px; border-radius: 6px; cursor: pointer; }
    </style>
</head>
<body>

<div id="login-screen">
    <h1 class="logo-main">UERH</h1>
    <div class="logo-subtext">ADMINISTRATION PANEL 2026</div>
    <button class="btn-google" onclick="login()">
        <img src="https://www.google.com/favicon.ico" width="18">
        CONTINUAR CON GOOGLE
    </button>
</div>

<div id="main-container" class="container">
    <div class="user-bar">
        <div><span id="user-mail"></span> <span id="user-role" style="margin-left:10px; color:var(--color-blue); font-weight:bold;"></span></div>
        <button onclick="logout()" style="background:none; border:1px solid #333; color:#888; cursor:pointer; padding:5px 12px; border-radius:6px;">Salir</button>
    </div>

    <div class="header">
        <h2>SISTEMA <span style="color:var(--color-blue)">CONTROL</span></h2>
        <div class="stats">
            <div class="stat-box"><small>Inscritos</small><span id="count-j">0</span></div>
            <div class="stat-box"><small>Caja Total</small><span id="count-m" style="color:var(--success)">$ 0</span></div>
        </div>
    </div>

    <div class="controls-row">
        <input type="text" id="search-player" class="search-input" placeholder="Buscar por jugador..." oninput="filtrarYMostrar()">
        <select id="filter-team" class="select-input" onchange="filtrarYMostrar()">
            <option value="">Todos los Equipos</option>
        </select>
        <button class="btn-export" onclick="exportarCSV()">📊 Exportar CSV</button>
    </div>

    <div class="table-wrapper">
        <table>
            <thead>
                <tr>
                    <th>Fotos</th>
                    <th>Jugador</th>
                    <th>Equipo / Rol</th>
                    <th>Estado</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody id="main-table"></tbody>
        </table>
    </div>
</div>

<div id="modal-visor" class="modal-overlay" onclick="this.style.display='none'">
    <img id="modal-img" src="">
</div>

<div id="modal-edit" class="modal-overlay">
    <div class="modal-content">
        <h3>Editar Registro</h3>
        <input type="hidden" id="edit-id">
        
        <label>Nombre del Jugador</label>
        <input type="text" id="edit-name">
        
        <label>WhatsApp</label>
        <input type="text" id="edit-whatsapp">

        <div id="edit-roles-container"></div>

        <div class="modal-actions">
            <button class="btn-cancel" onclick="cerrarModalEdicion()">Cancelar</button>
            <button class="btn-save" onclick="guardarEdicion()">Guardar Cambios</button>
        </div>
    </div>
</div>

<script>
    const ADMINS = ["rojjosue@gmail.com", "josuerojas@gmail.com", "uniondeequiposderollerhockey@gmail.com"];
    let rawData = {}; 

    firebase.initializeApp({
        apiKey: "AIzaSyCREXn3CyGfcSJlOLYn79vvUbgsTs4tc6c",
        authDomain: "uerh-t2026.firebaseapp.com",
        databaseURL: "https://uerh-t2026-default-rtdb.firebaseio.com",
        projectId: "uerh-t2026",
        storageBucket: "uerh-t2026.firebasestorage.app",
        messagingSenderId: "378184888320",
        appId: "1:378184888320:web:72183df90850048fc028e5"
    });

    const db = firebase.database();
    const auth = firebase.auth();

    function login() { auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()); }
    function logout() { auth.signOut().then(() => location.reload()); }

    auth.onAuthStateChanged(user => {
        if (user && ADMINS.includes(user.email.toLowerCase())) {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('main-container').style.display = 'block';
            document.getElementById('user-mail').innerText = user.email;
            document.getElementById('user-role').innerText = "[ADMIN]";
            escucharBaseDeDatos();
        } else if (user) {
            alert("No tienes permisos de administrador.");
            logout();
        }
    });

    function escucharBaseDeDatos() {
        db.ref('inscripciones').on('value', snapshot => {
            rawData = snapshot.val() || {};
            actualizarFiltroEquipos();
            filtrarYMostrar();
        });
    }

    function actualizarFiltroEquipos() {
        const select = document.getElementById('filter-team');
        const equipos = new Set();
        for (let id in rawData) {
            const r = rawData[id];
            if(r.roles) r.roles.forEach(role => equipos.add(role.team));
            else if(r.teamName) equipos.add(r.teamName);
        }
        const valorActual = select.value;
        select.innerHTML = '<option value="">Todos los Equipos</option>';
        Array.from(equipos).sort().forEach(equipo => {
            select.innerHTML += `<option value="${equipo}" ${valorActual === equipo ? 'selected' : ''}>${equipo}</option>`;
        });
    }

    function filtrarYMostrar() {
        const searchName = document.getElementById('search-player').value.toLowerCase();
        const selectedTeam = document.getElementById('filter-team').value;
        const tbody = document.getElementById('main-table');
        tbody.innerHTML = "";
        let count = 0, money = 0;

        for (let id in rawData) {
            const r = rawData[id];
            const rolesTxt = r.roles ? r.roles.map(x => `${x.team} (${x.role})`).join(', ') : `${r.teamName} (${r.role})`;
            const cumpleNombre = r.jugadorName.toLowerCase().includes(searchName);
            const cumpleEquipo = selectedTeam === "" || rolesTxt.includes(selectedTeam);

            if (cumpleNombre && cumpleEquipo) {
                count++;
                if (r.estado === "approved") money += 1200;
                tbody.innerHTML += `
                    <tr>
                        <td>
                            <img src="${r.fotoCarnet}" class="foto-mini" onclick="abrirVisor('${r.fotoCarnet}')">
                            <img src="${r.fotoPago}" class="foto-mini" onclick="abrirVisor('${r.fotoPago}')">
                        </td>
                        <td><strong>${r.jugadorName}</strong><br><small>${r.whatsapp || ''}</small></td>
                        <td><small>${rolesTxt.replace(/, /g, '<br>')}</small></td>
                        <td><span class="badge ${r.estado === 'approved' ? 'badge-approved' : 'badge-pending'}">${(r.estado || 'pendiente').toUpperCase()}</span></td>
                        <td>
                            <button class="btn-action btn-ok" onclick="actualizarEstado('${id}', 'approved')" title="Aprobar">OK</button>
                            <button class="btn-action btn-no" onclick="actualizarEstado('${id}', 'delete')" title="Borrar">X</button>
                            <button class="btn-action btn-edit" onclick="abrirModalEdicion('${id}')" title="Editar Todo">✎</button>
                        </td>
                    </tr>
                `;
            }
        }
        document.getElementById('count-j').innerText = count;
        document.getElementById('count-m').innerText = "$ " + money.toLocaleString();
    }

    function abrirModalEdicion(id) {
        const r = rawData[id];
        document.getElementById('edit-id').value = id;
        document.getElementById('edit-name').value = r.jugadorName;
        document.getElementById('edit-whatsapp').value = r.whatsapp || "";
        
        const container = document.getElementById('edit-roles-container');
        container.innerHTML = "";

        if (r.roles) {
            // Caso múltiples roles
            r.roles.forEach((rol, index) => {
                container.innerHTML += `
                    <div style="border-top: 1px solid #333; margin-top:15px; padding-top:10px;">
                        <label>Equipo ${index + 1}</label>
                        <input type="text" class="edit-team" data-index="${index}" value="${rol.team}">
                        <label>Rol ${index + 1}</label>
                        <select class="edit-role" data-index="${index}">
                            <option value="Jugador" ${rol.role === 'Jugador' ? 'selected' : ''}>Jugador</option>
                            <option value="Portero" ${rol.role === 'Portero' ? 'selected' : ''}>Portero</option>
                        </select>
                    </div>
                `;
            });
        } else {
            // Caso registro simple (compatibilidad)
            container.innerHTML = `
                <div style="border-top: 1px solid #333; margin-top:15px; padding-top:10px;">
                    <label>Equipo</label>
                    <input type="text" id="edit-single-team" value="${r.teamName || ''}">
                    <label>Rol</label>
                    <select id="edit-single-role">
                        <option value="Jugador" ${r.role === 'Jugador' ? 'selected' : ''}>Jugador</option>
                        <option value="Portero" ${r.role === 'Portero' ? 'selected' : ''}>Portero</option>
                    </select>
                </div>
            `;
        }
        
        document.getElementById('modal-edit').style.display = 'flex';
    }

    function cerrarModalEdicion() { document.getElementById('modal-edit').style.display = 'none'; }

    function guardarEdicion() {
        const id = document.getElementById('edit-id').value;
        const name = document.getElementById('edit-name').value;
        const wa = document.getElementById('edit-whatsapp').value;
        const r = rawData[id];
        
        if(name.trim() === "") return alert("El nombre no puede estar vacío.");

        let updateData = {
            jugadorName: name,
            whatsapp: wa
        };

        if (r.roles) {
            const teamsInputs = document.querySelectorAll('.edit-team');
            const rolesSelects = document.querySelectorAll('.edit-role');
            let nuevosRoles = [];
            
            teamsInputs.forEach((input, i) => {
                nuevosRoles.push({
                    team: input.value,
                    role: rolesSelects[i].value
                });
            });
            updateData.roles = nuevosRoles;
        } else {
            updateData.teamName = document.getElementById('edit-single-team').value;
            updateData.role = document.getElementById('edit-single-role').value;
        }
        
        db.ref('inscripciones/' + id).update(updateData).then(() => {
            cerrarModalEdicion();
            alert("Registro actualizado correctamente.");
        });
    }

    function actualizarEstado(id, accion) {
        if (accion === 'approved') {
            if(confirm("¿Aprobar este registro?")) {
                db.ref('inscripciones/' + id).update({ estado: 'approved' });
            }
        } else if (accion === 'delete') {
            if(confirm("¿ELIMINAR PERMANENTEMENTE? Esta acción no se puede deshacer.")) {
                db.ref('inscripciones/' + id).remove();
            }
        }
    }

    function exportarCSV() {
        const searchName = document.getElementById('search-player').value.toLowerCase();
        const selectedTeam = document.getElementById('filter-team').value;
        let csvContent = "data:text/csv;charset=utf-8,Jugador,WhatsApp,Equipos,Estado\n";
        for (let id in rawData) {
            const r = rawData[id];
            const rolesTxt = r.roles ? r.roles.map(x => `${x.team}-${x.role}`).join(' | ') : `${r.teamName}-${r.role}`;
            if (r.jugadorName.toLowerCase().includes(searchName) && (selectedTeam === "" || rolesTxt.includes(selectedTeam))) {
                csvContent += `"${r.jugadorName}","${r.whatsapp || ''}","${rolesTxt}","${r.estado || 'pendiente'}"\n`;
            }
        }
        const link = document.createElement("a");
        link.setAttribute("href", encodeURI(csvContent));
        link.setAttribute("download", "reporte_uerh.csv");
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    }

    function abrirVisor(url) { document.getElementById('modal-img').src = url; document.getElementById('modal-visor').style.display = 'flex'; }
</script>
</body>
</html>
