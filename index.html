<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UERH Admin - Panel Oficial</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

    <style>
        :root {
            --bg-dark: #06090f; 
            --bg-card: #111622; 
            --text-main: #ffffff;
            --text-muted: #8b9bb4; 
            --success: #27ae60; 
            --color-blue: #4285f4;
            --accent-blue: #1a73e8;
        }

        body {
            font-family: 'Segoe UI', Roboto, sans-serif; margin: 0; 
            background: radial-gradient(circle at top, #1a2a44 0%, #06090f 100%);
            color: var(--text-main); min-height: 100vh;
        }

        /* LOGIN ELEGANTE */
        #login-screen {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100vh;
        }

        .login-box {
            background: rgba(17, 22, 34, 0.8);
            backdrop-filter: blur(10px);
            padding: 40px; border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            width: 320px; text-align: center;
        }

        .logo-elegante {
            font-size: 3rem; font-weight: 800; letter-spacing: 10px;
            color: #ffffff; text-shadow: 0 0 15px rgba(255, 255, 255, 0.2);
            margin-bottom: 5px;
        }

        .sub-logo {
            color: var(--text-muted); font-size: 0.75rem;
            letter-spacing: 5px; text-transform: uppercase; margin-bottom: 30px;
        }

        input {
            width: 100%; padding: 12px; margin-bottom: 15px;
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px; color: white; outline: none; box-sizing: border-box;
        }

        input:focus { border-color: var(--color-blue); }

        .btn-login {
            width: 100%; padding: 12px; background: var(--accent-blue);
            color: white; border: none; border-radius: 8px;
            font-weight: 600; cursor: pointer; transition: 0.3s;
        }

        .btn-login:hover { background: #1557b0; transform: translateY(-2px); }

        /* PANEL PRINCIPAL */
        #main-container { display: none; max-width: 1200px; margin: auto; padding: 20px; }
        .user-bar { 
            background: var(--bg-card); padding: 15px; border-radius: 12px; 
            margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; 
            border: 1px solid rgba(255,255,255,0.05); 
        }

        .nav-tabs { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
        .nav-link { 
            color: var(--text-muted); cursor: pointer; padding: 10px 20px; 
            border-radius: 8px; font-size: 0.9rem; transition: 0.3s; 
        }
        .nav-link.active { background: var(--accent-blue); color: white; font-weight: 600; }

        .table-wrapper { background: var(--bg-card); border-radius: 15px; overflow: hidden; border: 1px solid rgba(255,255,255,0.05); }
        table { width: 100%; border-collapse: collapse; }
        th { background: #161b28; color: var(--color-blue); padding: 15px; text-align: left; font-size: 0.75rem; text-transform: uppercase; }
        td { padding: 14px 15px; border-bottom: 1px solid rgba(255,255,255,0.03); }

        .foto-mini { width: 45px; height: 45px; object-fit: cover; border-radius: 6px; }
        .badge { padding: 5px 10px; border-radius: 6px; font-size: 0.7rem; font-weight: bold; }
        .badge-approved { background: rgba(39, 174, 96, 0.15); color: #2ecc71; }

        .btn-action { border: none; padding: 8px 12px; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .btn-ok { background: var(--success); color: white; }
        .btn-logout { background: transparent; border: 1px solid #333; color: #888; }

        .section-panel { display: none; }
        .section-panel.active { display: block; }
    </style>
</head>
<body>

<div id="login-screen">
    <div class="logo-elegante">UERH</div>
    <div class="sub-logo">SISTEMA CENTRAL</div>
    <div class="login-box">
        <input type="text" id="user-input" placeholder="Usuario">
        <input type="password" id="pass-input" placeholder="Contraseña">
        <button class="btn-login" onclick="validarIngreso()">INGRESAR</button>
    </div>
</div>

<div id="main-container">
    <div class="user-bar">
        <div>Sesión: <span id="display-name" style="color:var(--color-blue); font-weight: bold;"></span></div>
        <button onclick="cerrarSesion()" class="btn-action btn-logout">Salir</button>
    </div>

    <div class="nav-tabs">
        <div class="nav-link active" onclick="switchTab('tab-inscripciones', this)">Inscripciones</div>
        <div class="nav-link" onclick="switchTab('tab-plantilla', this)">Plantilla</div>
        <div class="nav-link" onclick="switchTab('tab-data', this)">Configuración</div>
    </div>

    <div id="tab-inscripciones" class="section-panel active">
        <div class="table-wrapper">
            <table>
                <thead><tr><th>Foto</th><th>Jugador</th><th>Equipo</th><th>Estado</th><th>Acción</th></tr></thead>
                <tbody id="main-table"></tbody>
            </table>
        </div>
    </div>

    <div id="tab-plantilla" class="section-panel">
        <div class="table-wrapper">
            <table>
                <thead><tr><th>Foto</th><th>Jugador</th><th>Equipo</th><th>Nº</th><th>Rol</th></tr></thead>
                <tbody id="plantilla-table"></tbody>
            </table>
        </div>
    </div>

    <div id="tab-data" class="section-panel">
        <div class="table-wrapper">
            <table>
                <thead><tr><th>Equipo</th><th>Data Generada</th></tr></thead>
                <tbody id="data-table-body"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCREXn3CyGfcSJlOLYn79vvUbgsTs4tc6c",
        databaseURL: "https://uerh-t2026-default-rtdb.firebaseio.com",
        projectId: "uerh-t2026"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let currentUser = null;
    let rawData = {};

    function validarIngreso() {
        const u = document.getElementById('user-input').value;
        const p = document.getElementById('pass-input').value;

        if (u === 'admin' && p === 'rojjos2026') {
            iniciarApp('Administrador', 'admin');
        } else if (u === 'visor' && p === 'ava2026') {
            iniciarApp('Visor', 'viewer');
        } else {
            alert("Credenciales incorrectas");
        }
    }

    function iniciarApp(nombre, rol) {
        currentUser = { nombre, rol };
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('main-container').style.display = 'block';
        document.getElementById('display-name').innerText = nombre;
        
        cargarDatos();
    }

    function cerrarSesion() { location.reload(); }

    function cargarDatos() {
        db.ref('inscripciones').on('value', snap => {
            rawData = snap.val() || {};
            renderizarInscripciones();
            renderizarPlantilla();
        });

        db.ref('config/jugadores').on('value', snap => {
            const tbody = document.getElementById('data-table-body');
            tbody.innerHTML = "";
            Object.values(snap.val() || {}).forEach(j => {
                tbody.innerHTML += `<tr><td>${j.equipo}</td><td>${j.info}</td></tr>`;
            });
        });
    }

    function renderizarInscripciones() {
        const tbody = document.getElementById('main-table');
        tbody.innerHTML = "";
        for (let id in rawData) {
            const r = rawData[id];
            const btn = currentUser.rol === 'admin' && r.estado !== 'approved'
                ? `<button onclick="aprobar('${id}')" class="btn-action btn-ok">✓</button>`
                : `<small style="color:gray">${r.estado === 'approved' ? 'LISTO' : 'SOLO LECTURA'}</small>`;

            tbody.innerHTML += `<tr>
                <td><img src="${r.fotoCarnet}" class="foto-mini"></td>
                <td>${r.jugadorName}</td><td>${r.teamName || '---'}</td>
                <td><span class="badge ${r.estado === 'approved' ? 'badge-approved' : ''}">${(r.estado || 'pen').toUpperCase()}</span></td>
                <td>${btn}</td>
            </tr>`;
        }
    }

    function renderizarPlantilla() {
        const tbody = document.getElementById('plantilla-table');
        tbody.innerHTML = "";
        for (let id in rawData) {
            const r = rawData[id];
            if (r.estado === 'approved') {
                tbody.innerHTML += `<tr>
                    <td><img src="${r.fotoCarnet}" class="foto-mini"></td>
                    <td>${r.jugadorName}</td><td>${r.teamName}</td>
                    <td>#${r.shirtNum || ''}</td><td>${r.role || 'JG'}</td>
                </tr>`;
            }
        }
    }

    function aprobar(id) {
        if (currentUser.rol !== 'admin') return;
        const r = rawData[id];
        const infoFinal = `#${r.shirtNum || '00'} ${r.jugadorName} (${r.role || 'JG'})`;
        
        db.ref('inscripciones/' + id).update({ estado: 'approved' });
        
        db.ref('config/jugadores').once('value', snap => {
            let actual = Object.values(snap.val() || {});
            actual.push({ equipo: r.teamName || 'Sin Equipo', info: infoFinal });
            db.ref('config/jugadores').set(actual);
        });
    }

    function switchTab(id, el) {
        document.querySelectorAll('.section-panel').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        el.classList.add('active');
    }
</script>
</body>
</html>
