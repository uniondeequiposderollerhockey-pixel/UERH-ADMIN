<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UERH Admin - Panel Oficial</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

    <style>
        :root {
            --bg-dark: #0a0e17; --bg-card: #111622; --text-main: #ffffff;
            --text-muted: #8b9bb4; --success: #27ae60; --danger: #ea4335;
            --color-blue: #4285f4;
        }

        body {
            font-family: 'Segoe UI', Roboto, sans-serif; margin: 0; 
            background-color: var(--bg-dark); color: var(--text-main);
            min-height: 100vh;
        }

        /* LOGO ELEGANTE */
        .logo-elegante {
            font-size: 3.5rem; font-weight: 800; letter-spacing: 8px;
            color: #ffffff; text-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
            margin-bottom: 5px;
        }
        .sub-logo {
            color: var(--text-muted); letter-spacing: 4px; font-size: 0.8rem;
            margin-bottom: 30px; text-transform: uppercase;
        }

        #login-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; }
        
        .btn-google {
            background: #ffffff; color: #000; display: flex; align-items: center; gap: 12px; 
            padding: 12px 24px; font-weight: 600; cursor: pointer; border: none; border-radius: 10px;
        }

        #main-container { display: none; max-width: 1200px; margin: auto; padding: 20px; }
        
        .user-bar { 
            background: var(--bg-card); padding: 15px; border-radius: 10px; margin-bottom: 20px; 
            display: flex; justify-content: space-between; align-items: center; border: 1px solid rgba(255,255,255,0.05); 
        }
        
        /* PESTAÑAS */
        .nav-tabs { display: flex; gap: 5px; margin-bottom: 20px; flex-wrap: wrap; }
        .nav-link { color: var(--text-muted); cursor: pointer; padding: 10px 18px; border-radius: 6px; font-size: 0.9rem; transition: 0.3s; }
        .nav-link:hover { background: rgba(255,255,255,0.05); }
        .nav-link.active { background: var(--color-blue); color: white; font-weight: bold; }

        .table-wrapper { background: var(--bg-card); border-radius: 12px; overflow: hidden; border: 1px solid rgba(255,255,255,0.05); }
        table { width: 100%; border-collapse: collapse; }
        th { background: #161b28; color: var(--color-blue); padding: 15px; text-align: left; font-size: 0.7rem; text-transform: uppercase; }
        td { padding: 12px 15px; border-bottom: 1px solid rgba(255,255,255,0.03); font-size: 0.85rem; }

        .btn-action { border: none; padding: 8px 15px; border-radius: 6px; cursor: pointer; color: white; font-weight: bold; }
        .btn-ok { background: var(--success); }
        .btn-logout { background: transparent; border: 1px solid #333; color: #888; }
        
        .foto-mini { width: 40px; height: 40px; object-fit: cover; border-radius: 4px; }
        .badge { padding: 4px 8px; border-radius: 4px; font-size: 0.7rem; font-weight: bold; }
        .badge-approved { background: rgba(39, 174, 96, 0.1); color: #27ae60; }
        
        .section-panel { display: none; }
        .section-panel.active { display: block; }
    </style>
</head>
<body>

<div id="login-screen">
    <div class="logo-elegante">UERH</div>
    <div class="sub-logo">Panel de Control</div>
    <button onclick="iniciarSesion()" class="btn-google">
        <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="18">
        INGRESAR CON GOOGLE
    </button>
</div>

<div id="main-container">
    <div class="user-bar">
        <div>Admin: <span id="user-display" style="color:var(--color-blue);"></span></div>
        <button onclick="cerrarSesion()" class="btn-action btn-logout">Cerrar Sesión</button>
    </div>

    <div class="nav-tabs">
        <div class="nav-link active" onclick="switchTab('tab-inscripciones', this)">Inscripciones</div>
        <div class="nav-link" onclick="switchTab('tab-plantilla', this)">Plantilla</div>
        <div class="nav-link" onclick="switchTab('tab-data', this)">Data Config</div>
        <div class="nav-link" onclick="switchTab('tab-usuarios', this)">Usuarios</div>
    </div>

    <div id="tab-inscripciones" class="section-panel active">
        <div class="table-wrapper">
            <table>
                <thead><tr><th>Foto</th><th>Jugador</th><th>Equipo</th><th>Estado</th><th>Acción</th></tr></thead>
                <tbody id="main-table"></tbody>
            </table>
        </div>
    </div>

    <div id="tab-plantilla" class="section-panel">
        <div class="table-wrapper">
            <table>
                <thead><tr><th>Foto</th><th>Jugador</th><th>Equipo</th><th>Nº</th><th>Rol</th></tr></thead>
                <tbody id="plantilla-table"></tbody>
            </table>
        </div>
    </div>

    <div id="tab-data" class="section-panel">
        <div class="table-wrapper">
            <table>
                <thead><tr><th>Equipo</th><th>Info para Configuración</th></tr></thead>
                <tbody id="data-table-body"></tbody>
            </table>
        </div>
    </div>

    <div id="tab-usuarios" class="section-panel">
        <div class="table-wrapper">
            <table>
                <thead><tr><th>Email</th><th>Rol</th></tr></thead>
                <tbody id="users-table"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCREXn3CyGfcSJlOLYn79vvUbgsTs4tc6c",
        authDomain: "uerh-t2026.firebaseapp.com",
        databaseURL: "https://uerh-t2026-default-rtdb.firebaseio.com",
        projectId: "uerh-t2026",
        storageBucket: "uerh-t2026.firebasestorage.app",
        messagingSenderId: "378184888320",
        appId: "1:378184888320:web:72183df90850048fc028e5"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.database();
    const provider = new firebase.auth.GoogleAuthProvider();

    let userRole = 'viewer'; 
    let rawData = {};

    const mapaRoles = { "Jugador": "JG", "Capitán": "C", "Asistente": "A", "Golero 1": "G1", "Golero 2": "G2", "Golero 3": "G3" };
    function obtenerSigla(r) { return mapaRoles[r] || "JG"; }

    function iniciarSesion() { auth.signInWithPopup(provider); }
    function cerrarSesion() { auth.signOut(); }

    auth.onAuthStateChanged(user => {
        if (user) { verificarAcceso(user); } 
        else {
            document.getElementById('login-screen').style.display = 'flex';
            document.getElementById('main-container').style.display = 'none';
        }
    });

    function verificarAcceso(user) {
        const email = user.email.toLowerCase().trim();
        if (email === 'rojjosue@gmail.com' || email === 'uniondeequiposderollerhockey@gmail.com') {
            userRole = 'admin';
        } else if (email === 'cx6cav@gmail.com') {
            userRole = 'viewer';
        } else {
            alert("Acceso denegado."); auth.signOut(); return;
        }
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('main-container').style.display = 'block';
        document.getElementById('user-display').innerText = user.displayName;
        inicializarApp();
    }

    function inicializarApp() {
        // Escuchar Inscripciones y Plantilla
        db.ref('inscripciones').on('value', snap => {
            rawData = snap.val() || {};
            renderizarInscripciones();
            renderizarPlantilla();
        });

        // Escuchar Data Config
        db.ref('config/jugadores').on('value', snap => {
            const tbody = document.getElementById('data-table-body');
            tbody.innerHTML = "";
            Object.values(snap.val() || {}).forEach(j => {
                tbody.innerHTML += `<tr><td>${j.equipo}</td><td>${j.info}</td></tr>`;
            });
        });

        // Escuchar Usuarios
        db.ref('whitelist').on('value', snap => {
            const tbody = document.getElementById('users-table');
            tbody.innerHTML = "";
            Object.values(snap.val() || {}).forEach(u => {
                tbody.innerHTML += `<tr><td>${u.email}</td><td>${(u.role || 'viewer').toUpperCase()}</td></tr>`;
            });
        });
    }

    function renderizarInscripciones() {
        const tbody = document.getElementById('main-table');
        tbody.innerHTML = "";
        for (let id in rawData) {
            const r = rawData[id];
            const btn = userRole === 'admin' && r.estado !== 'approved' 
                ? `<button onclick="aprobar('${id}')" class="btn-action btn-ok">✓</button>` 
                : `<small style="color:gray">${r.estado === 'approved' ? 'Listo' : 'Lectura'}</small>`;
            tbody.innerHTML += `<tr>
                <td><img src="${r.fotoCarnet}" class="foto-mini"></td>
                <td>${r.jugadorName}</td><td>${r.teamName || '---'}</td>
                <td><span class="badge ${r.estado === 'approved' ? 'badge-approved' : ''}">${(r.estado || 'pen').toUpperCase()}</span></td>
                <td>${btn}</td>
            </tr>`;
        }
    }

    function renderizarPlantilla() {
        const tbody = document.getElementById('plantilla-table');
        tbody.innerHTML = "";
        for (let id in rawData) {
            const r = rawData[id];
            if (r.estado === 'approved') {
                tbody.innerHTML += `<tr>
                    <td><img src="${r.fotoCarnet}" class="foto-mini"></td>
                    <td>${r.jugadorName}</td><td>${r.teamName}</td>
                    <td>#${r.shirtNum || '00'}</td><td>${obtenerSigla(r.role)}</td>
                </tr>`;
            }
        }
    }

    function aprobar(id) {
        if (userRole !== 'admin') return;
        const r = rawData[id];
        const infoFinal = `#${r.shirtNum || '00'} ${r.jugadorName} (${obtenerSigla(r.role)})`;
        db.ref('inscripciones/' + id).update({ estado: 'approved' });
        db.ref('config/jugadores').once('value', snap => {
            let actual = Object.values(snap.val() || {});
            actual.push({ equipo: r.teamName || 'Sin Equipo', info: infoFinal });
            db.ref('config/jugadores').set(actual);
        });
    }

    function switchTab(id, el) {
        document.querySelectorAll('.section-panel').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        el.classList.add('active');
    }
</script>
</body>
</html>
