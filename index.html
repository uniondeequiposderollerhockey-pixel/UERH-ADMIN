<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UERH Admin - Panel Oficial (Acceso Protegido)</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

    <style>
        :root {
            --bg-dark: #0a0e17; --bg-card: #111622; --text-main: #ffffff;
            --text-muted: #8b9bb4; --success: #27ae60; --danger: #ea4335;
            --color-blue: #4285f4; --color-red: #ea4335;
        }

        body {
            font-family: 'Segoe UI', Roboto, sans-serif; margin: 0; 
            background-color: var(--bg-dark); color: var(--text-main);
            min-height: 100vh;
            background-image: radial-gradient(circle at 50% -20%, rgba(66,133,244,0.15) 0%, rgba(10,14,23,0) 50%);
        }

        .container { max-width: 1100px; margin: auto; padding: 20px; display: none; }
        .user-bar { background: var(--bg-card); padding: 12px 20px; border-radius: 10px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; border: 1px solid rgba(255,255,255,0.05); font-size: 0.85rem; }
        
        .nav-tabs { display: flex; gap: 10px; margin-bottom: 20px; border-bottom: 1px solid #333; padding-bottom: 10px; }
        .nav-link { color: var(--text-muted); cursor: pointer; padding: 8px 15px; border-radius: 6px; font-size: 0.9rem; transition: 0.3s; }
        .nav-link.active { background: var(--color-blue); color: white; }

        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .stats { display: flex; gap: 12px; }
        .stat-box { background: var(--bg-card); padding: 10px 18px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.05); text-align: center; min-width: 110px; }
        .stat-box small { display: block; font-size: 0.65rem; color: var(--color-blue); text-transform: uppercase; }
        .stat-box span { font-size: 1.2rem; font-weight: bold; }

        .controls-row { display: flex; gap: 10px; margin-bottom: 15px; flex-wrap: wrap; align-items: center; }
        .search-input, .select-input { 
            background: #1c2333; border: 1px solid #333; color: white; 
            padding: 10px; border-radius: 6px; font-size: 0.85rem; outline: none;
        }
        .btn-export { background: #27ae60; color: white; border: none; padding: 10px 15px; border-radius: 6px; cursor: pointer; font-weight: bold; margin-left: auto; }

        .table-wrapper { background: var(--bg-card); border-radius: 12px; overflow: hidden; border: 1px solid rgba(255,255,255,0.05); margin-bottom: 30px;}
        table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
        th { background: #161b28; color: var(--color-blue); text-align: left; padding: 15px; text-transform: uppercase; font-size: 0.7rem; }
        td { padding: 12px 15px; border-bottom: 1px solid rgba(255,255,255,0.03); }

        .foto-mini { width: 45px; height: 45px; object-fit: cover; border-radius: 6px; cursor: pointer; border: 1px solid #333; margin-right: 5px; }
        .badge { padding: 4px 8px; border-radius: 5px; font-size: 0.7rem; font-weight: bold; }
        .badge-approved { background: rgba(39, 174, 96, 0.1); color: #27ae60; }
        .badge-pending { background: rgba(241, 196, 15, 0.1); color: #f1c40f; }

        .roster-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; margin-top: 20px; }
        .team-card { background: var(--bg-card); border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); padding: 20px; }
        .team-header { display: flex; align-items: center; gap: 15px; border-bottom: 1px solid #333; padding-bottom: 12px; margin-bottom: 15px; }
        .team-logo-preview { width: 55px; height: 55px; object-fit: contain; background: #000; border-radius: 8px; border: 1px solid #333; padding: 4px; }
        .player-entry { font-size: 0.9rem; margin-bottom: 6px; display: flex; align-items: center; }
        .player-num { color: var(--color-blue); font-weight: bold; margin-right: 8px; width: 25px; }

        .modal-overlay { display: none; position: fixed; z-index: 1000; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); backdrop-filter: blur(8px); justify-content: center; align-items: center; }
        #modal-img { max-width: 90%; max-height: 80vh; border-radius: 10px; }
        
        .modal-content { background: var(--bg-card); padding: 25px; border-radius: 15px; border: 1px solid var(--color-blue); width: 420px; max-height: 90vh; overflow-y: auto; }
        .modal-content h3 { margin-top: 0; color: var(--color-blue); text-align: center; }
        .form-group { margin-bottom: 12px; }
        .form-group label { display: block; font-size: 0.75rem; color: var(--text-muted); margin-bottom: 4px; }
        .form-group input { width: 100%; padding: 10px; border-radius: 6px; background: #1c2333; border: 1px solid #333; color: white; box-sizing: border-box; outline: none; }
        .modal-actions { display: flex; justify-content: flex-end; gap: 10px; margin-top: 20px; }

        .edit-foto-preview { width: 100px; height: 100px; object-fit: cover; border-radius: 10px; border: 2px solid var(--color-blue); display: block; margin: 0 auto 15px; background: #000; }

        .section-panel { display: none; }
        .section-panel.active { display: block; }

        .btn-action { border: none; padding: 8px 12px; border-radius: 6px; cursor: pointer; color: white; font-size: 0.8rem; font-weight: bold; transition: 0.2s; }
        .btn-edit { background: var(--color-blue); }
        .btn-delete { background: var(--danger); }
        .btn-ok { background: var(--success); }
        .btn-sync { background: var(--color-blue); color: white; border: none; padding: 5px 12px; border-radius: 6px; cursor: pointer; font-size: 0.75rem; font-weight: bold; }
        
        .rol-row { display: flex; gap: 5px; margin-bottom: 8px; align-items: center; }
        .rol-input { flex: 2; padding: 8px; background: #1c2333; border: 1px solid #333; color: white; border-radius: 4px; font-size: 0.8rem; }
        .rol-select { flex: 1.5; padding: 8px; background: #1c2333; border: 1px solid #333; color: white; border-radius: 4px; font-size: 0.8rem; }

        /* Login Screen */
        #login-screen { position: fixed; inset: 0; z-index: 9999; background: var(--bg-dark); display: flex; align-items: center; justify-content: center; background-image: radial-gradient(circle at 50% -20%, rgba(66,133,244,0.15) 0%, rgba(10,14,23,0) 50%); }
        .login-box { background: var(--bg-card); padding: 40px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); width: 100%; max-width: 380px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); text-align: center; }
    </style>
</head>
<body>

<div id="login-screen">
    <div class="login-box">
        <h2 style="color: var(--color-blue); margin-bottom: 10px;">UERH ADMIN</h2>
        <p style="color: var(--text-muted); font-size: 0.85rem; margin-bottom: 30px;">Panel de Gestión Oficial</p>
        
        <div class="form-group" style="text-align: left;">
            <label>USUARIO</label>
            <input type="text" id="login-user" placeholder="Ej: Admin" onkeypress="if(event.key==='Enter') intentarLogin()">
        </div>
        
        <div class="form-group" style="text-align: left; margin-top: 15px;">
            <label>CONTRASEÑA</label>
            <input type="password" id="login-pass" placeholder="••••••••" onkeypress="if(event.key==='Enter') intentarLogin()">
        </div>

        <button onclick="intentarLogin()" style="width: 100%; margin-top: 25px; padding: 14px; background: var(--color-blue); color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer;">INICIAR SESIÓN</button>
        <div id="login-error" style="color: var(--danger); font-size: 0.8rem; margin-top: 15px; display: none;">Credenciales incorrectas</div>
    </div>
</div>

<div id="main-container" class="container">
    <div class="user-bar">
        <div><span style="font-weight:bold; color:var(--color-blue);">UERH ADMIN PANEL</span> <span id="view-mode" style="font-size: 0.7rem; margin-left: 10px; color: #888;"></span></div>
        <div style="display: flex; gap: 8px;">
            <button onclick="location.reload()" style="background:none; border:1px solid #333; color:#888; cursor:pointer; padding:5px 12px; border-radius:6px;">Recargar</button>
            <button onclick="cerrarSesion()" style="background:var(--danger); border:none; color:white; cursor:pointer; padding:5px 12px; border-radius:6px; font-weight:bold;">Salir</button>
        </div>
    </div>

    <div class="nav-tabs">
        <div class="nav-link active" onclick="switchTab('tab-inscripciones', this)">Inscripciones</div>
        <div class="nav-link" onclick="switchTab('tab-plantillas', this)">Plantillas</div>
        <div class="nav-link" onclick="switchTab('tab-data', this)">Data (Config)</div>
    </div>

    <div id="tab-inscripciones" class="section-panel active">
        <div class="header">
            <h2>GESTIÓN <span style="color:var(--color-blue)">INSCRIPCIONES</span></h2>
            <div class="stats">
                <div class="stat-box"><small>Inscritos</small><span id="count-j">0</span></div>
                <div class="stat-box"><small>Caja</small><span id="count-m" style="color:var(--success)">$ 0</span></div>
            </div>
        </div>
        <div class="controls-row">
            <input type="text" id="search-player" class="search-input" placeholder="Buscar jugador..." oninput="filtrarYMostrar()">
            <select id="filter-team" class="select-input" onchange="filtrarYMostrar()"><option value="">Todos los Equipos</option></select>
            <button class="btn-export" onclick="exportarCSV()">Exportar CSV</button>
        </div>
        <div class="table-wrapper">
            <table>
                <thead><tr><th>Fotos</th><th>Jugador / #</th><th>Equipos</th><th>Estado</th><th class="col-accion">Acciones</th></tr></thead>
                <tbody id="main-table"></tbody>
            </table>
        </div>
    </div>

    <div id="tab-plantillas" class="section-panel">
        <div class="header"><h2>ROSTERS <span style="color:var(--color-blue)">EQUIPOS</span></h2></div>
        <div id="roster-container" class="roster-grid"></div>
    </div>

    <div id="tab-data" class="section-panel">
        <div class="header">
            <h2>CONFIG <span style="color:var(--color-blue)">JUGADORES</span></h2>
            <button class="btn-sync" onclick="sincronizarConfiguracion()">Sincronización Total</button>
        </div>
        <div class="table-wrapper">
            <table>
                <thead><tr><th style="width: 30%;">Equipo</th><th>Info Completa</th></tr></thead>
                <tbody id="data-table-body"></tbody>
            </table>
        </div>
    </div>
</div>

<div id="modal-visor" class="modal-overlay" onclick="this.style.display='none'"><img id="modal-img" src=""></div>

<div id="modal-edit" class="modal-overlay">
    <div class="modal-content" onclick="event.stopPropagation()">
        <h3>Editar Inscripción</h3>
        <img id="edit-foto-v" class="edit-foto-preview" src="">
        <input type="hidden" id="edit-id">
        <div class="form-group"><label>Cambiar Foto</label><input type="file" id="edit-foto-file" accept="image/*" onchange="previsualizarArchivo(this)"></div>
        <div class="form-group"><label>Nombre</label><input type="text" id="edit-name"></div>
        <div class="form-group"><label>Número</label><input type="text" id="edit-number"></div>
        <div class="form-group">
            <label style="display: flex; justify-content: space-between;">Equipos/Roles <button onclick="agregarFilaRol()" style="background:var(--success); border:none; color:white; padding:2px 8px; border-radius:4px; cursor:pointer; font-size:0.7rem;">+ Añadir</button></label>
            <div id="roles-container" style="margin-top: 10px;"></div>
        </div>
        <div class="modal-actions">
            <button class="btn-action" style="background:#444" onclick="cerrarModalEdit()">Cancelar</button>
            <button class="btn-action btn-ok" onclick="guardarCambiosInscripcion()">Guardar Cambios</button>
        </div>
    </div>
</div>

<script>
    firebase.initializeApp({
        apiKey: "AIzaSyCREXn3CyGfcSJlOLYn79vvUbgsTs4tc6c",
        authDomain: "uerh-t2026.firebaseapp.com",
        databaseURL: "https://uerh-t2026-default-rtdb.firebaseio.com",
        projectId: "uerh-t2026",
        storageBucket: "uerh-t2026.firebasestorage.app",
        messagingSenderId: "378184888320",
        appId: "1:378184888320:web:72183df90850048fc028e5"
    });

    const db = firebase.database();
    let rawData = {};
    let logosData = {};
    let currentBase64 = null;
    let rolesEnEdicion = [];

    const USUARIOS = [
        { u: "AVA", p: "ava2026", role: "viewer" },
        { u: "FLOR", p: "flor83", role: "viewer" },
        { u: "ADMIN", p: "rojjos2026", role: "admin" }
    ];

    const mapaRoles = { "Jugador": "JG", "Capitán": "C", "Asistente": "A", "Golero 1": "G1", "Golero 2": "G2", "Golero 3": "G3" };

    function obtenerSiglaRol(rolLargo) {
        if (!rolLargo) return "JG";
        let rolLimpio = rolLargo.replace(/[()]/g, '').trim();
        return mapaRoles[rolLimpio] || rolLimpio;
    }

    // --- AUTENTICACIÓN ---
    function intentarLogin() {
        const uInput = document.getElementById('login-user').value.toLowerCase();
        const pInput = document.getElementById('login-pass').value.toLowerCase();
        const found = USUARIOS.find(x => x.u.toLowerCase() === uInput && x.p.toLowerCase() === pInput);

        if(found) {
            localStorage.setItem('uerh_session', found.u.toUpperCase());
            localStorage.setItem('uerh_role', found.role);
            checkSesion();
        } else {
            document.getElementById('login-error').style.display = 'block';
        }
    }

    function checkSesion() {
        const user = localStorage.getItem('uerh_session');
        const role = localStorage.getItem('uerh_role');
        if(user) {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('main-container').style.display = 'block';
            document.getElementById('view-mode').innerText = role === 'admin' ? '[ADMINISTRADOR]' : '[MODO CONSULTA]';
            if(role === 'viewer') aplicarModoLectura();
            inicializarApp();
        }
    }

    function cerrarSesion() {
        localStorage.clear();
        location.reload();
    }

    function aplicarModoLectura() {
        const style = document.createElement('style');
        style.innerHTML = `.btn-edit, .btn-delete, .btn-ok, .btn-sync, .col-accion { display: none !important; }`;
        document.head.appendChild(style);
        window.guardarCambiosInscripcion = () => alert("Acceso denegado");
        window.actualizarEstado = () => alert("Acceso denegado");
        window.borrarInscripcion = () => alert("Acceso denegado");
    }

    // --- LÓGICA DE DATOS ---
    window.onload = checkSesion;

    function inicializarApp() {
        db.ref('inscripciones').on('value', snap => { rawData = snap.val() || {}; actualizarFiltroEquipos(); filtrarYMostrar(); generarPlantillas(); });
        db.ref('config/logos').on('value', snap => { logosData = snap.val() || {}; generarPlantillas(); });
        escucharConfigCentral();
    }

    function switchTab(tabId, el) {
        document.querySelectorAll('.section-panel').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.nav-link').forEach(n => n.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');
        el.classList.add('active');
    }

    function filtrarYMostrar() {
        const searchName = document.getElementById('search-player').value.toLowerCase();
        const selectedTeam = document.getElementById('filter-team').value;
        const tbody = document.getElementById('main-table');
        tbody.innerHTML = "";
        let count = 0, money = 0;

        for (let id in rawData) {
            const r = rawData[id];
            const listaRoles = r.roles || [{ team: r.teamName || "Sin Equipo", role: "Jugador" }];
            const matchTeam = selectedTeam === "" || listaRoles.some(rol => rol.team === selectedTeam);

            if (r.jugadorName.toLowerCase().includes(searchName) && matchTeam) {
                count++;
                if (r.estado === "approved") money += 1200;
                let badgeClass = r.estado === 'approved' ? 'badge-approved' : 'badge-pending';
                let htmlEquipos = listaRoles.map(rol => `${rol.team} <small>(${obtenerSiglaRol(rol.role)})</small>`).join("<br>");

                tbody.innerHTML += `<tr>
                    <td><img src="${r.fotoCarnet}" class="foto-mini" onclick="abrirVisor('${r.fotoCarnet}')"></td>
                    <td>${r.jugadorName} <b>#${r.shirtNum || ''}</b></td>
                    <td>${htmlEquipos}</td>
                    <td><span class="badge ${badgeClass}">${(r.estado || 'pen').toUpperCase()}</span></td>
                    <td class="col-accion">
                        <button class="btn-action btn-ok" onclick="actualizarEstado('${id}', 'approved')">✓</button>
                        <button class="btn-action btn-edit" onclick="abrirModalEdit('${id}')">✎</button>
                        <button class="btn-action btn-delete" onclick="borrarInscripcion('${id}')">✕</button>
                    </td>
                </tr>`;
            }
        }
        document.getElementById('count-j').innerText = count;
        document.getElementById('count-m').innerText = "$ " + money.toLocaleString();
    }

    function generarPlantillas() {
        const container = document.getElementById('roster-container');
        container.innerHTML = "";
        let equiposObj = {};
        for (let id in rawData) {
            const r = rawData[id];
            if(r.estado !== "approved") continue;
            (r.roles || [{ team: r.teamName || "Sin Equipo" }]).forEach(rol => {
                if(!rol.team) return;
                if(!equiposObj[rol.team]) equiposObj[rol.team] = [];
                equiposObj[rol.team].push({ nombre: r.jugadorName, numero: r.shirtNum || "00" });
            });
        }
        for(let eq in equiposObj) {
            let html = `<div class="team-card"><div class="team-header"><img src="${logosData[eq] || ''}" class="team-logo-preview" onerror="this.src='https://via.placeholder.com/60'"><h3>${eq.toUpperCase()}</h3></div>`;
            equiposObj[eq].forEach(p => html += `<div class="player-entry"><span class="player-num">#${p.numero}</span><span>${p.nombre}</span></div>`);
            container.innerHTML += html + `</div>`;
        }
    }

    function escucharConfigCentral() {
        db.ref('config/jugadores').on('value', snap => {
            const tbody = document.getElementById('data-table-body');
            tbody.innerHTML = "";
            const items = Object.values(snap.val() || {}).sort((a,b) => a.equipo > b.equipo ? 1 : -1);
            items.forEach(j => tbody.innerHTML += `<tr><td style="color:var(--color-blue); font-weight:bold;">${j.equipo}</td><td>${j.info}</td></tr>`);
        });
    }

    function abrirModalEdit(id) {
        const r = rawData[id];
        document.getElementById('edit-id').value = id;
        document.getElementById('edit-name').value = r.jugadorName;
        document.getElementById('edit-number').value = r.shirtNum || '';
        document.getElementById('edit-foto-v').src = r.fotoCarnet || '';
        currentBase64 = r.fotoCarnet;
        rolesEnEdicion = r.roles ? JSON.parse(JSON.stringify(r.roles)) : [{ team: r.teamName || "", role: "Jugador" }];
        renderizarFilasRoles();
        document.getElementById('modal-edit').style.display = 'flex';
    }

    function renderizarFilasRoles() {
        const container = document.getElementById('roles-container');
        container.innerHTML = "";
        rolesEnEdicion.forEach((rol, i) => {
            container.innerHTML += `<div class="rol-row">
                <input type="text" class="rol-input" value="${rol.team}" onchange="rolesEnEdicion[${i}].team=this.value">
                <select class="rol-select" onchange="rolesEnEdicion[${i}].role=this.value">
                    ${Object.keys(mapaRoles).map(m => `<option value="${m}" ${rol.role===m?'selected':''}>${mapaRoles[m]}</option>`).join('')}
                </select>
                ${i>0 ? `<button onclick="rolesEnEdicion.splice(${i},1);renderizarFilasRoles()" style="background:var(--danger); border:none; color:white; padding:5px 8px; border-radius:4px; cursor:pointer;">✕</button>` : ''}
            </div>`;
        });
    }

    function agregarFilaRol() { rolesEnEdicion.push({ team: "", role: "Jugador" }); renderizarFilasRoles(); }
    function cerrarModalEdit() { document.getElementById('modal-edit').style.display = 'none'; }
    function abrirVisor(url) { document.getElementById('modal-img').src = url; document.getElementById('modal-visor').style.display = 'flex'; }
    function previsualizarArchivo(input) { if (input.files[0]) { const reader = new FileReader(); reader.onload = e => { document.getElementById('edit-foto-v').src = e.target.result; currentBase64 = e.target.result; }; reader.readAsDataURL(input.files[0]); } }

    function guardarCambiosInscripcion() {
        const id = document.getElementById('edit-id').value;
        const up = { jugadorName: document.getElementById('edit-name').value, shirtNum: document.getElementById('edit-number').value, roles: rolesEnEdicion, fotoCarnet: currentBase64 };
        db.ref('inscripciones/' + id).update(up).then(() => { cerrarModalEdit(); sincronizarConfiguracion(); });
    }

    function actualizarEstado(id, est) { db.ref('inscripciones/' + id).update({ estado: est }).then(() => { if(est==='approved') sincronizarConfiguracion(); }); }
    function borrarInscripcion(id) { if(confirm("¿Eliminar?")) db.ref('inscripciones/' + id).remove(); }

    function sincronizarConfiguracion() {
        let nuevos = [];
        for (let id in rawData) {
            const r = rawData[id];
            if (r.estado === "approved") {
                (r.roles || [{ team: r.teamName, role: "Jugador" }]).forEach(rol => {
                    if(rol.team) nuevos.push({ equipo: rol.team, info: `#${r.shirtNum || '00'} ${r.jugadorName} (${obtenerSiglaRol(rol.role)})` });
                });
            }
        }
        db.ref('config/jugadores').set(nuevos);
    }

    function actualizarFiltroEquipos() {
        const select = document.getElementById('filter-team');
        const eqSet = new Set();
        for (let id in rawData) (rawData[id].roles || [{ team: rawData[id].teamName }]).forEach(rol => eqSet.add(rol.team));
        const current = select.value;
        select.innerHTML = '<option value="">Todos los Equipos</option>';
        Array.from(eqSet).sort().forEach(e => { if(e) select.innerHTML += `<option value="${e}" ${current===e?'selected':''}>${e}</option>`; });
    }

    function exportarCSV() {
        let csv = "Jugador,Numero,Equipos,Estado\n";
        for (let id in rawData) {
            const r = rawData[id];
            const rolesT = (r.roles || []).map(rol => `${rol.team}(${rol.role})`).join(" | ");
            csv += `"${r.jugadorName}","${r.shirtNum}","${rolesT}","${r.estado}"\n`;
        }
        const blob = new Blob([csv], { type: 'text/csv' });
        const url = window.URL.createObjectURL(blob);
        const a = document.createElement('a'); a.href = url; a.download = 'inscripciones.csv'; a.click();
    }
