<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>U.E.R.H. - Panel Administrativo 2026</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

    <style>
        :root {
            --bg-dark: #0a0e17; --bg-card: #111622; --text-main: #ffffff;
            --text-muted: #8b9bb4; --success: #27ae60; --danger: #ea4335;
            --color-blue: #4285f4; --color-red: #ea4335;
        }

        body {
            font-family: 'Segoe UI', Roboto, sans-serif; margin: 0; 
            background-color: var(--bg-dark); color: var(--text-main);
            display: flex; justify-content: center; align-items: center; min-height: 100vh;
        }

        .main-container { width: 100%; max-width: 600px; padding: 20px; text-align: center; }
        .card { background-color: var(--bg-card); padding: 25px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.05); box-shadow: 0 10px 40px rgba(0,0,0,0.5); }

        table { width: 100%; border-collapse: collapse; font-size: 0.75rem; color: white; margin-top: 15px; }
        th, td { border: 1px solid rgba(255,255,255,0.1); padding: 8px; text-align: left; }
        th { background: rgba(66, 133, 244, 0.1); color: var(--color-blue); }

        .btn-action { padding: 5px 10px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .btn-approve { background: var(--success); color: white; }
        .btn-reject { background: var(--danger); color: white; }
        
        .status-badge { padding: 2px 5px; border-radius: 4px; font-size: 0.65rem; text-transform: uppercase; }
        .status-pendiente { background: var(--color-blue); }
        .status-rechazado { background: var(--danger); }
        .status-approved { background: var(--success); }

        .img-preview { width: 40px; height: 40px; object-fit: cover; border-radius: 4px; cursor: pointer; margin-right: 5px; border: 1px solid rgba(255,255,255,0.2); }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div class="main-container">
    <h1 style="color: var(--color-blue);">ADMINISTRACIÓN UERH</h1>

    <div id="auth-section" class="card">
        <p>Inicie sesión con una cuenta autorizada</p>
        <button onclick="login()" style="padding: 10px 20px; cursor: pointer;">Entrar con Google</button>
    </div>

    <div id="admin-panel" class="card hidden">
        <h3>Lista de Inscripciones 2026</h3>
        <div style="overflow-x: auto;">
            <table id="tabla-registros">
                <thead>
                    <tr>
                        <th>Jugador</th>
                        <th>Equipos / Roles</th>
                        <th>Fotos</th>
                        <th>Estado</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody id="lista-jugadores"></tbody>
            </table>
        </div>
        <br>
        <button onclick="handleLogout()" style="background: transparent; color: var(--text-muted); border: 1px solid; cursor: pointer;">Cerrar Sesión</button>
    </div>
</div>

<script>
    // Configuración idéntica a tu archivo original
    firebase.initializeApp({
        apiKey: "AIzaSyCREXn3CyGfcSJlOLYn79vvUbgsTs4tc6c",
        authDomain: "uerh-t2026.firebaseapp.com",
        databaseURL: "https://uerh-t2026-default-rtdb.firebaseio.com",
        projectId: "uerh-t2026",
        storageBucket: "uerh-t2026.firebasestorage.app",
        messagingSenderId: "378184888320",
        appId: "1:378184888320:web:72183df90850048fc028e5"
    });

    const ADMIN_EMAILS = ["josuerojas@gmail.com", "uniondeequiposderollerhockey@gmail.com"];

    async function login() {
        const provider = new firebase.auth.GoogleAuthProvider();
        await firebase.auth().signInWithPopup(provider);
    }

    function handleLogout() { firebase.auth().signOut().then(() => location.reload()); }

    firebase.auth().onAuthStateChanged((user) => {
        if (user && ADMIN_EMAILS.includes(user.email)) {
            document.getElementById('auth-section').classList.add('hidden');
            document.getElementById('admin-panel').classList.remove('hidden');
            cargarAdmin();
        } else if (user) {
            alert("No tienes permisos de administrador.");
            handleLogout();
        }
    });

    function cargarAdmin() {
        firebase.database().ref('inscripciones').on('value', snap => {
            const l = document.getElementById('lista-jugadores'); 
            l.innerHTML = "";
            
            snap.forEach(child => {
                const j = child.val();
                
                // CAMBIO CLAVE: Soporte para shirtNum (nuevo) y shirt (viejo)
                let rHtml = j.roles.map(r => {
                    const numero = r.shirtNum || r.shirt || "S/N";
                    return `• ${r.team}: ${r.role} (#${numero})`;
                }).join('<br>');

                const estadoClase = `status-${j.estado || 'pendiente'}`;

                l.innerHTML += `
                <tr>
                    <td>
                        <strong>${j.jugadorName}</strong><br>
                        <small>${j.whatsapp}</small>
                    </td>
                    <td>${rHtml}</td>
                    <td>
                        <img src="${j.fotoCarnet}" class="img-preview" title="Foto Carnet" onclick="window.open(this.src)">
                        <img src="${j.fotoPago}" class="img-preview" title="Comprobante" onclick="window.open(this.src)">
                    </td>
                    <td>
                        <span class="status-badge ${estadoClase}">${j.estado || 'pendiente'}</span>
                    </td>
                    <td>
                        <button class="btn-action btn-approve" onclick="aprobar('${child.key}')" title="Aprobar">✓</button>
                        <button class="btn-action btn-reject" onclick="rechazarAdmin('${child.key}')" title="Rechazar">✕</button>
                    </td>
                </tr>`;
            });
        });
    }

    async function aprobar(uid) { 
        if(confirm("¿Aprobar esta inscripción?")) {
            await firebase.database().ref('inscripciones/' + uid).update({ estado: 'approved' });
        }
    }
    
    // CAMBIO CLAVE: Ahora guarda exactamente "rechazado" para que coincida con el menú del usuario
    async function rechazarAdmin(uid) { 
        if(confirm("¿Rechazar inscripción? El usuario verá el botón para intentar de nuevo.")) {
            await firebase.database().ref('inscripciones/' + uid).update({ 
                estado: "rechazado" 
            });
        }
    }
</script>
</body>
</html>
