<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UERH Admin - Panel Oficial</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

    <style>
        /* MANTENGO TUS ESTILOS ORIGINALES */
        :root {
            --bg-dark: #0a0e17; --bg-card: #111622; --text-main: #ffffff;
            --text-muted: #8b9bb4; --success: #27ae60; --danger: #ea4335;
            --color-blue: #4285f4; --color-red: #ea4335;
        }

        body {
            font-family: 'Segoe UI', Roboto, sans-serif; margin: 0; 
            background-color: var(--bg-dark); color: var(--text-main);
            min-height: 100vh;
            background-image: radial-gradient(circle at 50% -20%, rgba(66,133,244,0.15) 0%, rgba(10,14,23,0) 50%);
        }

        /* DISEÑO DE PANTALLA LOGIN */
        #login-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-dark); display: flex; justify-content: center; align-items: center; z-index: 10000;
        }
        .login-box {
            background: var(--bg-card); padding: 40px; border-radius: 15px;
            border: 1px solid rgba(66,133,244,0.3); width: 320px; text-align: center;
        }
        .login-box h2 { color: var(--color-blue); margin-bottom: 25px; }
        .login-box input {
            width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 8px;
            background: #1c2333; border: 1px solid #333; color: white; box-sizing: border-box; outline: none;
        }
        .btn-login {
            width: 100%; padding: 12px; background: var(--color-blue); color: white;
            border: none; border-radius: 8px; cursor: pointer; font-weight: bold;
        }

        /* REGLA PARA USUARIO AVA (OCULTAR BOTONES) */
        body.role-ava .admin-only { display: none !important; }

        /* MANTENGO TUS ESTILOS DE TABLAS Y CONTENEDORES INTACTOS */
        #main-app { display: none; }
        .container { max-width: 1100px; margin: auto; padding: 20px; display: block; }
        .user-bar { background: var(--bg-card); padding: 12px 20px; border-radius: 10px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; border: 1px solid rgba(255,255,255,0.05); font-size: 0.85rem; }
        .nav-tabs { display: flex; gap: 10px; margin-bottom: 20px; border-bottom: 1px solid #333; padding-bottom: 10px; }
        .nav-link { color: var(--text-muted); cursor: pointer; padding: 8px 15px; border-radius: 6px; font-size: 0.9rem; transition: 0.3s; }
        .nav-link.active { background: var(--color-blue); color: white; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .stats { display: flex; gap: 12px; }
        .stat-box { background: var(--bg-card); padding: 10px 18px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.05); text-align: center; min-width: 110px; }
        .stat-box small { display: block; font-size: 0.65rem; color: var(--color-blue); text-transform: uppercase; }
        .stat-box span { font-size: 1.2rem; font-weight: bold; }
        .controls-row { display: flex; gap: 10px; margin-bottom: 15px; flex-wrap: wrap; align-items: center; }
        .search-input, .select-input { background: #1c2333; border: 1px solid #333; color: white; padding: 10px; border-radius: 6px; font-size: 0.85rem; outline: none; }
        .btn-export { background: #27ae60; color: white; border: none; padding: 10px 15px; border-radius: 6px; cursor: pointer; font-weight: bold; margin-left: auto; }
        .table-wrapper { background: var(--bg-card); border-radius: 12px; overflow: hidden; border: 1px solid rgba(255,255,255,0.05); margin-bottom: 30px;}
        table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
        th { background: #161b28; color: var(--color-blue); text-align: left; padding: 15px; text-transform: uppercase; font-size: 0.7rem; }
        td { padding: 12px 15px; border-bottom: 1px solid rgba(255,255,255,0.03); }
        .foto-mini { width: 45px; height: 45px; object-fit: cover; border-radius: 6px; cursor: pointer; border: 1px solid #333; margin-right: 5px; }
        .badge { padding: 4px 8px; border-radius: 5px; font-size: 0.7rem; font-weight: bold; }
        .badge-approved { background: rgba(39, 174, 96, 0.1); color: #27ae60; }
        .badge-pending { background: rgba(241, 196, 15, 0.1); color: #f1c40f; }
        .roster-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; margin-top: 20px; }
        .team-card { background: var(--bg-card); border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); padding: 20px; }
        .team-header { display: flex; align-items: center; gap: 15px; border-bottom: 1px solid #333; padding-bottom: 12px; margin-bottom: 15px; }
        .team-logo-preview { width: 55px; height: 55px; object-fit: contain; background: #000; border-radius: 8px; border: 1px solid #333; padding: 4px; }
        .player-entry { font-size: 0.9rem; margin-bottom: 6px; display: flex; align-items: center; }
        .player-num { color: var(--color-blue); font-weight: bold; margin-right: 8px; width: 25px; }
        .modal-overlay { display: none; position: fixed; z-index: 1000; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); backdrop-filter: blur(8px); justify-content: center; align-items: center; }
        #modal-img { max-width: 90%; max-height: 80vh; border-radius: 10px; }
        .modal-content { background: var(--bg-card); padding: 25px; border-radius: 15px; border: 1px solid var(--color-blue); width: 380px; }
        .section-panel { display: none; }
        .section-panel.active { display: block; }
        .btn-action { border: none; padding: 8px 12px; border-radius: 6px; cursor: pointer; color: white; font-size: 0.8rem; font-weight: bold; transition: 0.2s; }
        .btn-edit { background: var(--color-blue); }
        .btn-delete { background: var(--danger); }
        .btn-ok { background: var(--success); }
        .btn-sync { background: var(--color-blue); color: white; border: none; padding: 5px 12px; border-radius: 6px; cursor: pointer; font-size: 0.75rem; font-weight: bold; }
    </style>
</head>
<body>

<div id="login-screen">
    <div class="login-box">
        <h2>UERH ADMIN</h2>
        <input type="text" id="user-input" placeholder="Usuario">
        <input type="password" id="pass-input" placeholder="Contraseña">
        <button class="btn-login" onclick="validarAcceso()">Entrar</button>
        <p id="login-err" style="color:var(--danger); font-size: 0.8rem; margin-top: 10px; display: none;">Credenciales incorrectas</p>
    </div>
</div>

<div id="main-app">
    <div class="container">
        <div class="user-bar">
            <div><span style="font-weight:bold; color:var(--color-blue);">UERH ADMIN PANEL</span></div>
            <div style="display:flex; gap:15px; align-items:center;">
                <span id="session-info" style="color:#888; font-size: 0.8rem;"></span>
                <button onclick="cerrarSesion()" style="background:none; border:1px solid #333; color:var(--danger); cursor:pointer; padding:5px 12px; border-radius:6px;">Cerrar Sesión</button>
            </div>
        </div>

        <div class="nav-tabs">
            <div class="nav-link active" onclick="switchTab('tab-inscripciones', this)">Inscripciones</div>
            <div class="nav-link" onclick="switchTab('tab-plantillas', this)">Plantillas</div>
            <div class="nav-link" onclick="switchTab('tab-data', this)">Data (Config)</div>
            <div class="nav-link" onclick="switchTab('tab-usuarios', this)">Usuarios</div>
        </div>

        <div id="tab-inscripciones" class="section-panel active">
            <div class="header">
                <h2>GESTIÓN <span style="color:var(--color-blue)">INSCRIPCIONES</span></h2>
                <div class="stats">
                    <div class="stat-box"><small>Inscritos</small><span id="count-j">0</span></div>
                    <div class="stat-box"><small>Caja</small><span id="count-m" style="color:var(--success)">$ 0</span></div>
                </div>
            </div>
            <div class="controls-row">
                <input type="text" id="search-player" class="search-input" placeholder="Buscar jugador..." oninput="filtrarYMostrar()">
                <select id="filter-team" class="select-input" onchange="filtrarYMostrar()"><option value="">Todos los Equipos</option></select>
                <button class="btn-export admin-only" onclick="exportarCSV()">Exportar CSV</button>
            </div>
            <div class="table-wrapper">
                <table>
                    <thead><tr><th>Fotos</th><th>Jugador / #</th><th>Equipo / Rol</th><th>Estado</th><th class="admin-only">Acciones</th></tr></thead>
                    <tbody id="main-table"></tbody>
                </table>
            </div>
        </div>

        <div id="tab-plantillas" class="section-panel">
            <div class="header"><h2>ROSTERS <span style="color:var(--color-blue)">EQUIPOS</span></h2></div>
            <div id="roster-container" class="roster-grid"></div>
        </div>

        <div id="tab-data" class="section-panel">
            <div class="header">
                <h2>CONFIG <span style="color:var(--color-blue)">JUGADORES</span></h2>
                <button class="btn-sync admin-only" onclick="sincronizarConfiguracion()">Sincronización Total</button>
            </div>
            <div class="table-wrapper">
                <table>
                    <thead><tr><th style="width: 30%;">Equipo</th><th>Info Completa</th></tr></thead>
                    <tbody id="data-table-body"></tbody>
                </table>
            </div>
        </div>

        <div id="tab-usuarios" class="section-panel">
            <div class="header"><h2>GESTIÓN DE ACCESO</h2></div>
            <div class="table-wrapper">
                <table>
                    <thead><tr><th>Usuario</th><th>Rango</th><th class="admin-only">Clave</th><th class="admin-only">Acción</th></tr></thead>
                    <tbody id="users-body"></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<div id="modal-visor" class="modal-overlay" onclick="this.style.display='none'"><img id="modal-img" src=""></div>

<script>
    firebase.initializeApp({
        apiKey: "AIzaSyCREXn3CyGfcSJlOLYn79vvUbgsTs4tc6c",
        authDomain: "uerh-t2026.firebaseapp.com",
        databaseURL: "https://uerh-t2026-default-rtdb.firebaseio.com",
        projectId: "uerh-t2026",
        storageBucket: "uerh-t2026.firebasestorage.app",
        messagingSenderId: "378184888320",
        appId: "1:378184888320:web:72183df90850048fc028e5"
    });

    const db = firebase.database();
    let rawData = {};
    let logosData = {};
    let currentUser = null;

    // --- SESIÓN PERSISTENTE ---
    window.onload = () => {
        const saved = localStorage.getItem('uerh_session');
        if(saved) {
            currentUser = JSON.parse(saved);
            entrarAlPanel();
        }
    }

    function validarAcceso() {
        const u = document.getElementById('user-input').value.trim();
        const p = document.getElementById('pass-input').value.trim();
        let found = null;

        if (u === "admin" && p === "rojjos2026") {
            found = { user: "admin", role: "admin" };
        } else if (u === "ava" && p === "ava2026") {
            found = { user: "ava", role: "ava" };
        }

        if (found) {
            currentUser = found;
            localStorage.setItem('uerh_session', JSON.stringify(found));
            entrarAlPanel();
        } else {
            db.ref('whitelist').once('value', snap => {
                const list = snap.val() || {};
                for(let id in list) {
                    if(list[id].user === u && list[id].pass === p) {
                        found = list[id]; break;
                    }
                }
                if(found) {
                    currentUser = found;
                    localStorage.setItem('uerh_session', JSON.stringify(found));
                    entrarAlPanel();
                } else {
                    document.getElementById('login-err').style.display = 'block';
                }
            });
        }
    }

    function entrarAlPanel() {
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('main-app').style.display = 'block';
        document.getElementById('session-info').innerText = `${currentUser.user.toUpperCase()} (${currentUser.role.toUpperCase()})`;
        if(currentUser.role === 'ava') document.body.classList.add('role-ava');
        
        escucharInscripciones();
        escucharConfigCentral();
        db.ref('config/logos').on('value', snap => { logosData = snap.val() || {}; generarPlantillas(); });
        escucharUsuarios();
    }

    function cerrarSesion() {
        localStorage.removeItem('uerh_session');
        location.reload();
    }

    // --- TUS FUNCIONES DE LÓGICA (MANTENIDAS) ---
    function escucharInscripciones() {
        db.ref('inscripciones').on('value', snapshot => {
            rawData = snapshot.val() || {};
            actualizarFiltroEquipos();
            filtrarYMostrar();
            generarPlantillas();
        });
    }

    function generarPlantillas() {
        const container = document.getElementById('roster-container');
        if(!container) return;
        container.innerHTML = "";
        let equiposObj = {};
        for (let id in rawData) {
            const r = rawData[id];
            if(r.estado !== "approved") continue;
            const team = r.teamName || (r.roles ? r.roles[0].team : "Sin Equipo");
            if(!equiposObj[team]) equiposObj[team] = [];
            equiposObj[team].push({ nombre: r.jugadorName, numero: r.shirtNum || "00" });
        }
        for(let equipo in equiposObj) {
            const logoUrl = logosData[equipo] || "https://via.placeholder.com/60?text=Logo";
            let html = `<div class="team-card"><div class="team-header"><img src="${logoUrl}" class="team-logo-preview" onerror="this.src='https://via.placeholder.com/60?text=Logo'"><h3 style="margin:0; font-size:1.1rem; color:var(--color-blue);">${equipo.toUpperCase()}</h3></div>`;
            equiposObj[equipo].forEach(p => {
                html += `<div class="player-entry"><span class="player-num">#${p.numero}</span><span>${p.nombre}</span></div>`;
            });
            container.innerHTML += html + `</div>`;
        }
    }

    function filtrarYMostrar() {
        const searchName = document.getElementById('search-player').value.toLowerCase();
        const selectedTeam = document.getElementById('filter-team').value;
        const tbody = document.getElementById('main-table');
        if(!tbody) return;
        tbody.innerHTML = "";
        let count = 0, money = 0;
        for (let id in rawData) {
            const r = rawData[id];
            const equipo = r.teamName || (r.roles ? r.roles[0].team : "Sin Equipo");
            if (r.jugadorName.toLowerCase().includes(searchName) && (selectedTeam === "" || equipo === selectedTeam)) {
                count++; if (r.estado === "approved") money += 1200;
                tbody.innerHTML += `<tr>
                    <td><img src="${r.fotoCarnet}" class="foto-mini" onclick="abrirVisor('${r.fotoCarnet}')"></td>
                    <td>${r.jugadorName} <b>#${r.shirtNum || ''}</b></td>
                    <td>${equipo}</td>
                    <td><span class="badge ${r.estado === 'approved' ? 'badge-approved' : 'badge-pending'}">${(r.estado || 'pen').toUpperCase()}</span></td>
                    <td class="admin-only">
                        <button class="btn-action btn-ok" onclick="actualizarEstado('${id}', 'approved')">✓</button>
                        <button class="btn-action btn-delete" onclick="borrarInscripcion('${id}')">✕</button>
                    </td>
                </tr>`;
            }
        }
        document.getElementById('count-j').innerText = count;
        document.getElementById('count-m').innerText = "$ " + money.toLocaleString();
    }

    // El resto de tus funciones (sincronizarConfiguracion, actualizarEstado, etc.) van aquí abajo sin cambios
    function switchTab(t, el) { 
        document.querySelectorAll('.section-panel').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.nav-link').forEach(n => n.classList.remove('active'));
        document.getElementById(t).classList.add('active'); el.classList.add('active');
    }
    function abrirVisor(u) { document.getElementById('modal-img').src = u; document.getElementById('modal-visor').style.display = 'flex'; }
    function actualizarEstado(id, est) { if(currentUser.role==='admin') db.ref('inscripciones/'+id).update({estado:est}); }
    function borrarInscripcion(id) { if(currentUser.role==='admin' && confirm("¿Borrar?")) db.ref('inscripciones/'+id).remove(); }
    function escucharConfigCentral() {
        db.ref('config/jugadores').on('value', snap => {
            const tbody = document.getElementById('data-table-body');
            if(!tbody) return; tbody.innerHTML = "";
            const items = snap.val() || [];
            const lista = Array.isArray(items) ? items : Object.values(items);
            lista.forEach(j => { tbody.innerHTML += `<tr><td style="color:var(--color-blue); font-weight:bold;">${j.equipo}</td><td>${j.info}</td></tr>`; });
        });
    }
    function escucharUsuarios() {
        db.ref('whitelist').on('value', snap => {
            const body = document.getElementById('users-body');
            if(!body) return; body.innerHTML = "";
            const users = snap.val() || {};
            for(let id in users) body.innerHTML += `<tr><td>${users[id].user}</td><td>${users[id].role}</td><td class="admin-only">${users[id].pass}</td><td class="admin-only">---</td></tr>`;
        });
    }
    function actualizarFiltroEquipos() {
        const select = document.getElementById('filter-team');
        if(!select) return;
        const equipos = new Set();
        for (let id in rawData) { equipos.add(rawData[id].teamName || (rawData[id].roles ? rawData[id].roles[0].team : "Sin Equipo")); }
        const val = select.value;
        select.innerHTML = '<option value="">Todos los Equipos</option>';
        Array.from(equipos).sort().forEach(eq => select.innerHTML += `<option value="${eq}" ${val === eq ? 'selected' : ''}>${eq}</option>`);
    }
</script>
</body>
</html>
