<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UERH Admin - Panel Oficial</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

    <style>
        /* MANTENGO TUS ESTILOS ORIGINALES INTACTOS */
        :root {
            --bg-dark: #0a0e17; --bg-card: #111622; --text-main: #ffffff;
            --text-muted: #8b9bb4; --success: #27ae60; --danger: #ea4335;
            --color-blue: #4285f4; --color-red: #ea4335;
        }

        body {
            font-family: 'Segoe UI', Roboto, sans-serif; margin: 0; 
            background-color: var(--bg-dark); color: var(--text-main);
            min-height: 100vh;
            background-image: radial-gradient(circle at 50% -20%, rgba(66,133,244,0.15) 0%, rgba(10,14,23,0) 50%);
        }

        /* PANTALLA LOGIN */
        #login-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-dark); display: flex; justify-content: center; align-items: center; z-index: 10000;
        }
        .login-box {
            background: var(--bg-card); padding: 40px; border-radius: 15px;
            border: 1px solid rgba(66,133,244,0.3); width: 320px; text-align: center;
        }
        .login-box h2 { color: var(--color-blue); margin-bottom: 25px; }
        .login-box input {
            width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 8px;
            background: #1c2333; border: 1px solid #333; color: white; box-sizing: border-box; outline: none;
        }
        .btn-login {
            width: 100%; padding: 12px; background: var(--color-blue); color: white;
            border: none; border-radius: 8px; cursor: pointer; font-weight: bold;
        }

        /* REGLA PARA USUARIO AVA (SOLO MIRAR) */
        body.role-ava .admin-only { display: none !important; }

        #main-app { display: none; }
        .container { max-width: 1100px; margin: auto; padding: 20px; }
        .user-bar { background: var(--bg-card); padding: 12px 20px; border-radius: 10px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; border: 1px solid rgba(255,255,255,0.05); }
        
        /* ESTILOS DE TUS TABLAS Y COMPONENTES (MANTENIDOS) */
        .nav-tabs { display: flex; gap: 10px; margin-bottom: 20px; border-bottom: 1px solid #333; padding-bottom: 10px; }
        .nav-link { color: var(--text-muted); cursor: pointer; padding: 8px 15px; border-radius: 6px; font-size: 0.9rem; }
        .nav-link.active { background: var(--color-blue); color: white; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .stats { display: flex; gap: 12px; }
        .stat-box { background: var(--bg-card); padding: 10px 18px; border-radius: 10px; text-align: center; min-width: 110px; border: 1px solid rgba(255,255,255,0.05); }
        .stat-box small { display: block; font-size: 0.65rem; color: var(--color-blue); text-transform: uppercase; }
        .stat-box span { font-size: 1.2rem; font-weight: bold; }
        .table-wrapper { background: var(--bg-card); border-radius: 12px; overflow: hidden; border: 1px solid rgba(255,255,255,0.05); }
        table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
        th { background: #161b28; color: var(--color-blue); text-align: left; padding: 15px; text-transform: uppercase; font-size: 0.7rem; }
        td { padding: 12px 15px; border-bottom: 1px solid rgba(255,255,255,0.03); }
        .foto-mini { width: 45px; height: 45px; object-fit: cover; border-radius: 6px; }
        .btn-action { border: none; padding: 8px 12px; border-radius: 6px; cursor: pointer; color: white; font-weight: bold; }
        .btn-ok { background: var(--success); }
        .btn-delete { background: var(--danger); }
        .section-panel { display: none; }
        .section-panel.active { display: block; }
        
        .modal-overlay { display: none; position: fixed; z-index: 1000; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); justify-content: center; align-items: center; }
        .modal-content { background: var(--bg-card); padding: 25px; border-radius: 15px; border: 1px solid var(--color-blue); width: 320px; }
    </style>
</head>
<body>

<div id="login-screen">
    <div class="login-box">
        <h2>UERH ADMIN</h2>
        <input type="text" id="user-input" placeholder="Usuario">
        <input type="password" id="pass-input" placeholder="Contraseña">
        <button class="btn-login" onclick="validarAcceso()">Entrar</button>
        <p id="login-err" style="color:var(--danger); font-size: 0.8rem; margin-top: 10px; display: none;">Credenciales incorrectas</p>
    </div>
</div>

<div id="main-app">
    <div class="container">
        <div class="user-bar">
            <span style="font-weight:bold; color:var(--color-blue);">UERH ADMIN PANEL</span>
            <div style="display:flex; gap:15px; align-items:center;">
                <span id="session-info" style="color:#888; font-size: 0.8rem;"></span>
                <button onclick="cerrarSesion()" style="background:none; border:1px solid #444; color:var(--danger); cursor:pointer; padding:5px 12px; border-radius:6px;">Cerrar Sesión</button>
            </div>
        </div>

        <div class="nav-tabs">
            <div class="nav-link active" onclick="switchTab('tab-inscripciones', this)">Inscripciones</div>
            <div class="nav-link" onclick="switchTab('tab-data', this)">Data (Config)</div>
            <div class="nav-link" onclick="switchTab('tab-usuarios', this)">Usuarios</div>
        </div>

        <div id="tab-inscripciones" class="section-panel active">
            <div class="header">
                <h2>INSCRIPCIONES</h2>
                <div class="stats">
                    <div class="stat-box"><small>Inscritos</small><span id="count-j">0</span></div>
                    <div class="stat-box"><small>Caja</small><span id="count-m" style="color:var(--success)">$ 0</span></div>
                </div>
            </div>
            <div class="table-wrapper">
                <table>
                    <thead><tr><th>Foto</th><th>Jugador</th><th>Equipo</th><th>Estado</th><th class="admin-only">Acciones</th></tr></thead>
                    <tbody id="main-table"></tbody>
                </table>
            </div>
        </div>

        <div id="tab-data" class="section-panel">
            <div class="header">
                <h2>CONFIGURACIÓN</h2>
                <button class="btn-action btn-ok admin-only" onclick="sincronizarConfiguracion()">Sincronización Total</button>
            </div>
            <div class="table-wrapper">
                <table>
                    <thead><tr><th>Equipo</th><th>Información</th></tr></thead>
                    <tbody id="data-table-body"></tbody>
                </table>
            </div>
        </div>

        <div id="tab-usuarios" class="section-panel">
            <div class="header">
                <h2>USUARIOS</h2>
                <button class="btn-action btn-ok admin-only" onclick="document.getElementById('modal-user').style.display='flex'">+ Nuevo Usuario</button>
            </div>
            <div class="table-wrapper">
                <table>
                    <thead><tr><th>Usuario</th><th>Rol</th><th class="admin-only">Clave</th><th class="admin-only">Acción</th></tr></thead>
                    <tbody id="users-body"></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<div id="modal-user" class="modal-overlay">
    <div class="modal-content">
        <h3>Nuevo Usuario</h3>
        <input type="text" id="new-u-name" placeholder="Usuario" style="width:100%; padding:10px; margin-bottom:10px; background:#1c2333; border:1px solid #333; color:white; border-radius:6px;">
        <input type="text" id="new-u-pass" placeholder="Clave" style="width:100%; padding:10px; margin-bottom:10px; background:#1c2333; border:1px solid #333; color:white; border-radius:6px;">
        <select id="new-u-role" style="width:100%; padding:10px; margin-bottom:20px; background:#1c2333; border:1px solid #333; color:white; border-radius:6px;">
            <option value="admin">Admin</option>
            <option value="ava">Ava</option>
        </select>
        <div style="display:flex; gap:10px; justify-content:flex-end;">
            <button onclick="document.getElementById('modal-user').style.display='none'" style="background:#444; color:white; border:none; padding:8px 12px; border-radius:6px;">Cancelar</button>
            <button onclick="guardarUsuario()" style="background:var(--success); color:white; border:none; padding:8px 12px; border-radius:6px;">Guardar</button>
        </div>
    </div>
</div>

<script>
    firebase.initializeApp({
        apiKey: "AIzaSyCREXn3CyGfcSJlOLYn79vvUbgsTs4tc6c",
        databaseURL: "https://uerh-t2026-default-rtdb.firebaseio.com"
    });

    const db = firebase.database();
    let currentUser = null;

    // --- CORRECCIÓN DE LOGIN ---
    function validarAcceso() {
        const u = document.getElementById('user-input').value.trim();
        const p = document.getElementById('pass-input').value.trim();
        let found = null;

        // 1. Verificación de claves maestras fijas (Prioridad)
        if (u === "admin" && p === "rojjos2026") {
            found = { user: "admin", role: "admin" };
        } else if (u === "ava" && p === "ava2026") {
            found = { user: "ava", role: "ava" };
        }

        // 2. Si no es clave maestra, buscar en Firebase
        if (found) {
            ejecutarLogin(found);
        } else {
            db.ref('whitelist').once('value', snap => {
                const list = snap.val() || {};
                for(let id in list) {
                    if(list[id].user === u && list[id].pass === p) {
                        found = list[id]; break;
                    }
                }
                if(found) ejecutarLogin(found);
                else document.getElementById('login-err').style.display = 'block';
            });
        }
    }

    function ejecutarLogin(userObj) {
        currentUser = userObj;
        localStorage.setItem('uerh_session', JSON.stringify(userObj));
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('main-app').style.display = 'block';
        document.getElementById('session-info').innerText = `${currentUser.user.toUpperCase()} (${currentUser.role.toUpperCase()})`;
        
        if(currentUser.role === 'ava') document.body.classList.add('role-ava');
        
        // Iniciar procesos originales
        escucharInscripciones();
        escucharConfigCentral();
        escucharUsuarios();
    }

    window.onload = () => {
        const saved = localStorage.getItem('uerh_session');
        if(saved) ejecutarLogin(JSON.parse(saved));
    }

    function cerrarSesion() {
        localStorage.removeItem('uerh_session');
        location.reload();
    }

    // --- TUS FUNCIONES ORIGINALES ---
    function escucharInscripciones() {
        db.ref('inscripciones').on('value', snap => {
            const data = snap.val() || {};
            const tbody = document.getElementById('main-table');
            tbody.innerHTML = "";
            let c = 0, m = 0;
            for(let id in data) {
                const r = data[id];
                c++; if(r.estado === 'approved') m += 1200;
                tbody.innerHTML += `<tr>
                    <td><img src="${r.fotoCarnet}" class="foto-mini"></td>
                    <td>${r.jugadorName}</td>
                    <td>${r.teamName || '---'}</td>
                    <td><span style="color:${r.estado==='approved'?'var(--success)':'#f1c40f'}">${(r.estado||'pen').toUpperCase()}</span></td>
                    <td class="admin-only">
                        <button class="btn-action btn-ok" onclick="cambiarEst('${id}','approved')">✓</button>
                        <button class="btn-action btn-delete" onclick="borrarIns('${id}')">✕</button>
                    </td>
                </tr>`;
            }
            document.getElementById('count-j').innerText = c;
            document.getElementById('count-m').innerText = "$ " + m.toLocaleString();
        });
    }

    function escucharConfigCentral() {
        db.ref('config/jugadores').on('value', snap => {
            const tbody = document.getElementById('data-table-body');
            tbody.innerHTML = "";
            const list = Object.values(snap.val() || {});
            list.forEach(j => { tbody.innerHTML += `<tr><td>${j.equipo}</td><td>${j.info}</td></tr>`; });
        });
    }

    function escucharUsuarios() {
        db.ref('whitelist').on('value', snap => {
            const tbody = document.getElementById('users-body');
            tbody.innerHTML = "";
            const users = snap.val() || {};
            for(let id in users) {
                tbody.innerHTML += `<tr>
                    <td>${users[id].user}</td>
                    <td>${users[id].role}</td>
                    <td class="admin-only">${users[id].pass}</td>
                    <td class="admin-only"><button class="btn-action btn-delete" onclick="borrarUser('${id}')">✕</button></td>
                </tr>`;
            }
        });
    }

    function switchTab(t, el) {
        document.querySelectorAll('.section-panel').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.nav-link').forEach(n => n.classList.remove('active'));
        document.getElementById(t).classList.add('active'); el.classList.add('active');
    }

    function cambiarEst(id, e) { if(currentUser.role==='admin') db.ref('inscripciones/'+id).update({estado:e}); }
    function borrarIns(id) { if(currentUser.role==='admin' && confirm("¿Borrar?")) db.ref('inscripciones/'+id).remove(); }
    function guardarUsuario() {
        const u = document.getElementById('new-u-name').value;
        const p = document.getElementById('new-u-pass').value;
        const r = document.getElementById('new-u-role').value;
        if(u && p) db.ref('whitelist').push({user:u, pass:p, role:r}).then(() => document.getElementById('modal-user').style.display='none');
    }
    function borrarUser(id) { if(currentUser.role==='admin' && confirm("¿Borrar?")) db.ref('whitelist/'+id).remove(); }
    function sincronizarConfiguracion() { alert("Sincronizando..."); }
</script>
</body>
</html>
