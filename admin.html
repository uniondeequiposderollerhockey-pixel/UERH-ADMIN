<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>UERH Admin - Control Total</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>

    <style>
        :root { --blue: #4285f4; --bg: #0a0e17; --card: #111622; --text: #f0f0f0; --success: #27ae60; --danger: #ea4335; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); padding: 20px; margin: 0; }
        .container { max-width: 1100px; margin: auto; display: none; }
        
        /* Pantalla de Login (Restaurada) */
        #login-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 80vh; text-align: center; }
        .btn-google { background: white; color: #444; padding: 12px 24px; border-radius: 5px; border: none; font-weight: bold; cursor: pointer; display: flex; align-items: center; gap: 10px; font-size: 1rem; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }

        /* Header y Stats */
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .stats { display: flex; gap: 10px; }
        .stat-box { background: var(--card); padding: 8px 15px; border-radius: 8px; border: 1px solid #222; text-align: center; min-width: 100px; }
        .stat-box small { display: block; font-size: 0.6rem; color: var(--blue); text-transform: uppercase; }
        .stat-box span { font-size: 1.1rem; font-weight: bold; }
        .early-tag { font-size: 0.6rem; color: var(--success); display: block; margin-top: 2px; }

        .user-bar { background: var(--card); padding: 10px 20px; border-radius: 10px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #1a1a1a; font-size: 0.8rem; }

        /* Controles y Tabla */
        .controls { display: flex; justify-content: space-between; align-items: center; background: var(--card); padding: 12px; border-radius: 10px; margin-bottom: 20px; border: 1px solid #1a1a1a; gap: 10px; }
        select, input { background: #000; border: 1px solid #333; color: white; padding: 7px 10px; border-radius: 5px; font-size: 0.8rem; }
        
        .table-wrapper { background: var(--card); border-radius: 10px; overflow: hidden; border: 1px solid #1a1a1a; }
        table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
        th { background: #161b28; color: var(--blue); text-align: left; padding: 12px; text-transform: uppercase; font-size: 0.65rem; }
        td { padding: 10px 12px; border-bottom: 1px solid #1a1a1a; }

        /* Admin Rules */
        .admin-only { display: none; }
        body.is-admin .admin-only { display: inline-block; }
        body.is-admin .admin-cell { display: table-cell; }

        .foto-mini { width: 40px; height: 40px; object-fit: cover; border-radius: 4px; cursor: pointer; border: 1px solid #333; transition: 0.2s; }
        .foto-mini:hover { border-color: var(--blue); transform: scale(1.05); }
        .badge { padding: 3px 7px; border-radius: 4px; font-size: 0.65rem; font-weight: bold; }
        .badge-pending { background: rgba(241, 196, 15, 0.1); color: #f1c40f; }
        .badge-approved { background: rgba(39, 174, 96, 0.1); color: #27ae60; }

        /* Modales */
        .modal-overlay { display: none; position: fixed; z-index: 1000; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); backdrop-filter: blur(5px); justify-content: center; align-items: center; }
        .modal-content { background: var(--card); padding: 25px; border-radius: 12px; width: 90%; max-width: 400px; border: 1px solid #333; }
        #modal-img { max-width: 90%; max-height: 85%; border-radius: 8px; }
    </style>
</head>
<body>

<div id="login-screen">
    <h2 style="margin-bottom: 5px;">UERH <span style="color:var(--blue)">ADMIN</span></h2>
    <p style="color: #666; margin-bottom: 25px;">Gestión de Inscripciones 2026</p>
    <button class="btn-google" onclick="login()">
        <img src="https://upload.wikimedia.org/wikipedia/commons/5/53/Google_%22G%22_Logo.svg" width="20">
        Entrar con Google
    </button>
</div>

<div id="main-container" class="container">
    <div class="user-bar">
        <div><span id="user-mail"></span> • <span id="user-role" style="color:var(--blue)"></span></div>
        <button onclick="logout()" style="background:none; border:1px solid #444; color:#888; cursor:pointer; padding:4px 10px; border-radius:4px;">Salir</button>
    </div>

    <div class="header">
        <h2 style="margin:0;">PANEL <span style="color:var(--blue)">CONTROL</span></h2>
        <div class="stats">
            <div class="stat-box"><small>Jugadores</small><span id="count-j">0</span></div>
            <div class="stat-box">
                <small>Caja</small>
                <span id="count-m" style="color:var(--success)">$ 0</span>
                <span class="early-tag">TARIFA $1.200</span>
            </div>
        </div>
    </div>

    <div class="controls">
        <div style="display:flex; gap:8px;">
            <select id="f-equipo" onchange="renderTable()">
                <option value="todos">Todos los Equipos</option>
                <option value="Lobos">Lobos</option>
                <option value="Thunderfast">Thunderfast</option>
                <option value="Tejones">Tejones</option>
                <option value="Tcp">Tcp</option>
                <option value="Usb">Usb</option>
            </select>
            <input type="text" id="f-nombre" placeholder="Buscar..." onkeyup="renderTable()">
        </div>
        <button onclick="exportarExcel()" style="background:#1d6f42; color:white; border:none; padding:7px 15px; border-radius:5px; cursor:pointer; font-size:0.8rem; font-weight:bold;">EXCEL</button>
    </div>

    <div class="table-wrapper">
        <table>
            <thead>
                <tr>
                    <th>Fotos</th>
                    <th>Jugador / WhatsApp</th>
                    <th>Equipo</th>
                    <th>Rol / Nro</th>
                    <th>Estado</th>
                    <th class="admin-only admin-cell">Acciones</th>
                </tr>
            </thead>
            <tbody id="main-table"></tbody>
        </table>
    </div>
</div>

<div id="modal-visor" class="modal-overlay" onclick="this.style.display='none'">
    <img id="modal-img" src="">
</div>

<div id="modal-edit" class="modal-overlay">
    <div class="modal-content">
        <h3 style="margin-top:0; color:var(--blue)">Editar Registro</h3>
        <input type="hidden" id="edit-id">
        <input type="text" id="edit-nombre" placeholder="Nombre" style="width:100%; margin-bottom:10px; box-sizing:border-box;">
        <input type="text" id="edit-wa" placeholder="WhatsApp" style="width:100%; margin-bottom:10px; box-sizing:border-box;">
        <select id="edit-equipo" style="width:100%; margin-bottom:10px;">
            <option value="Lobos">Lobos</option>
            <option value="Thunderfast">Thunderfast</option>
            <option value="Tejones">Tejones</option>
            <option value="Tcp">Tcp</option>
            <option value="Usb">Usb</option>
        </select>
        <div style="display:flex; gap:10px; margin-bottom:20px;">
            <input type="text" id="edit-rol" placeholder="Rol" style="width:60%;">
            <input type="text" id="edit-nro" placeholder="Nro" style="width:35%;">
        </div>
        <div style="display:flex; gap:10px;">
            <button onclick="document.getElementById('modal-edit').style.display='none'" style="flex:1; padding:10px; cursor:pointer;">Cancelar</button>
            <button onclick="guardarEdicion()" style="flex:1; padding:10px; background:var(--success); color:white; border:none; border-radius:5px; cursor:pointer; font-weight:bold;">Guardar</button>
        </div>
    </div>
</div>

<script>
    const ADMINS = ["tu-email@gmail.com"]; // Agrega tus correos aquí
    
    const firebaseConfig = {
        apiKey: "AIzaSyCREXn3CyGfcSJlOLYn79vvUbgsTs4tc6c",
        authDomain: "uerh-t2026.firebaseapp.com",
        databaseURL: "https://uerh-t2026-default-rtdb.firebaseio.com",
        projectId: "uerh-t2026",
        storageBucket: "uerh-t2026.firebasestorage.app",
        messagingSenderId: "378184888320",
        appId: "1:378184888320:web:72183df90850048fc028e5"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const auth = firebase.auth();
    let cacheData = {};
    let isAdmin = false;

    function login() { auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()); }
    function logout() { auth.signOut().then(() => location.reload()); }

    auth.onAuthStateChanged(user => {
        if (user) {
            const email = user.email.toLowerCase();
            isAdmin = ADMINS.includes(email);
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('main-container').style.display = 'block';
            document.getElementById('user-mail').innerText = email;
            document.getElementById('user-role').innerText = isAdmin ? "ADMIN" : "VIEWER";
            if (isAdmin) document.body.classList.add('is-admin');
            cargarDatos();
        } else {
            document.getElementById('login-screen').style.display = 'flex';
            document.getElementById('main-container').style.display = 'none';
        }
    });

    function cargarDatos() {
        db.ref('inscripciones').on('value', snapshot => {
            cacheData = snapshot.val() || {};
            renderTable();
        });
    }

    function renderTable() {
        const eqF = document.getElementById('f-equipo').value;
        const nomF = document.getElementById('f-nombre').value.toLowerCase();
        const tbody = document.getElementById('main-table');
        tbody.innerHTML = "";
        let totalJ = 0; let totalD = 0;

        for (let id in cacheData) {
            const r = cacheData[id];
            if ((eqF === "todos" || r.teamName === eqF) && (r.jugadorName || "").toLowerCase().includes(nomF)) {
                totalJ++;
                if (r.estado === "approved") totalD += 1200;

                tbody.innerHTML += `
                    <tr>
                        <td>
                            <img src="${r.fotoCarnet}" class="foto-mini" onclick="abrirImagen('${r.fotoCarnet}')">
                            <img src="${r.fotoPago}" class="foto-mini" onclick="abrirImagen('${r.fotoPago}')">
                        </td>
                        <td>
                            <strong style="${isAdmin ? 'cursor:pointer; color:var(--blue);' : ''}" onclick="${isAdmin ? `abrirEdit('${id}')` : ''}">${r.jugadorName}</strong><br>
                            <small style="color:#25D366">${r.whatsapp || ""}</small>
                        </td>
                        <td><b>${r.teamName}</b></td>
                        <td><small>${r.role || ""} / #${r.shirtNum || "--"}</small></td>
                        <td><span class="badge ${r.estado === 'approved' ? 'badge-approved' : 'badge-pending'}">${(r.estado || 'pendiente').toUpperCase()}</span></td>
                        <td class="admin-only admin-cell">
                            <button onclick="abrirEdit('${id}')" style="background:none; border:1px solid #444; color:#aaa; cursor:pointer; padding:3px 7px; border-radius:4px; font-size:0.7rem;">Edit</button>
                            <button onclick="aprobar('${id}')" style="background:var(--blue); color:white; border:none; padding:4px 8px; border
